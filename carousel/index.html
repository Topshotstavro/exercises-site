<script>
if (!sessionStorage.getItem("loggedIn")) {
    const currentPath = window.location.pathname;
    window.location.href = "/login.html?page=carousel/";
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .carousel-wrapper {
            max-width: 900px;
            margin: 40px auto;
        }

        .carousel-item img {
            height: 500px;
            object-fit: cover;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Image Carousel</h1>
        <p class="subtitle">A Bootstrap slideshow using four images.</p>

        <div class="carousel-wrapper">
            <div id="mainCarousel" class="carousel slide shadow rounded overflow-hidden" data-bs-ride="carousel">

                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="frog.png" class="d-block w-100" alt="Frog">
                    </div>

                    <div class="carousel-item">
                        <img src="cthulu.jpg" class="d-block w-100" alt="Cthulu">
                    </div>

                    <div class="carousel-item">
                        <img src="coffee.jpg" class="d-block w-100" alt="Coffee">
                    </div>

                    <div class="carousel-item">
                        <img src="chocolate.jpg" class="d-block w-100" alt="Chocolate">
                    </div>
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
